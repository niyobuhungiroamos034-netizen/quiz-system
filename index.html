function renderStudents(list=students){

list.forEach(s=>{
let opt=document.createElement("option");
opt.value=s.reg;
opt.text=s.name;
select.add(opt);
});
}

/* SEARCH */
function filterStudents(){
let v=document.getElementById("search").value.toLowerCase();
renderStudents(students.filter(s=>s.name.toLowerCase().includes(v)));
}

/* COMBO */
function validateCombo(){
let c=document.getElementById("combo").value.trim().toUpperCase();
while(c!=="CSE"){

}

let quiz=[],i=0,score=0,time=15,timer;
let currentStudent={}, currentSubject="";

/* START */
function startQuiz(){
let reg=select.value;
let combo=validateCombo();
let subject=document.getElementById("subject").value;

if(!reg||!subject){
alert("Select student and subject");
return;
}

quiz=data[subject];

currentStudent=students.find(x=>x.reg==reg);
currentSubject=subject;

document.getElementById("register").style.display="none";
document.getElementById("quizBox").style.display="block";

document.getElementById("studentInfo").innerHTML=
`Name: ${currentStudent.name}<br>Reg: ${currentStudent.reg}<br>Subject: ${subject}`;

load();
}

/* TIMER */
function startTimer(){
time=15;
document.getElementById("timer").innerText="Time: "+time;
timer=setInterval(()=>{
time--;
document.getElementById("timer").innerText="Time: "+time;
if(time==0){clearInterval(timer);i++;next();}
},1000);
}

/* LOAD */
function load(){
clearInterval(timer);
let q=quiz[i];
document.getElementById("question").innerText=q.q;

for(let j=0;j<4;j++){
document.getElementById("o"+j).innerText=q.o[j];
}

startTimer();
}

/* CHECK */
function check(ans){
clearInterval(timer);
if(ans===quiz[i].a)score++;
i++;
next();
}

/* FINAL RESULT */
function next(){
if(i<quiz.length){
load();
}else{

let message="";
let color="";

if(score>=5){
message="🎉 Congratulations! You passed 🎉";
color="green";
}else{
message="❌ Fail try again ncuti yange";
color="red";
}

<h3 style="color:${color}">${message}</h3>
