/* ========== START QUIZ ========== */
function startQuiz(){

alert("Select student and subject");
return;
}

let combo=validateCombo();

quiz=data[selectedSubject];
i=0;score=0;

document.getElementById("studentBox").style.display="none";
document.getElementById("quizBox").style.display="block";

let s=students.find(x=>x.reg==reg);

document.getElementById("studentInfo").innerHTML=
`${s.name}<br>${s.reg}<br>Subject: ${selectedSubject}<br>Combination: ${combo}`;

load();
}

/* ========== QUIZ ENGINE ========== */
function load(){
clearInterval(timer);
let q=quiz[i];

document.getElementById("question").innerText=q.q;

let options=[...q.o];
let correct=options[q.a];
options.sort(()=>Math.random()-0.5);
q.a=options.indexOf(correct);

for(let j=0;j<4;j++){
document.getElementById("o"+j).innerText=options[j];
}

startTimer();
}

function startTimer(){
time=15;
document.getElementById("timer").innerText=time;
timer=setInterval(()=>{
time--;
document.getElementById("timer").innerText=time;
if(time<=0){clearInterval(timer);i++;next();}
},1000);
}

function check(ans){
clearInterval(timer);
if(ans===quiz[i].a)score++;
i++;
next();
}

/* ========== RESULT + MESSAGE ========== */
function next(){
if(i<quiz.length){
load();
}else{

let message="";
if(score>=5){
message="🎉 Congratulations! You passed 🎉";
}else{
message="❌ Fail try again ncuti yange";
}

/* save result */
let result={
name:selectedStudent.name,
reg:selectedStudent.reg,
subject:selectedSubject,
score:score,
total:quiz.length
};

let all=JSON.parse(localStorage.getItem("results")||"[]");
all.push(result);
localStorage.setItem("results",JSON.stringify(all));

document.getElementById("quizBox").innerHTML=
`<h2>Quiz Finished</h2>
<p>Score: ${score}/${quiz.length}</p>
<h3>${message}</h3>
<button class="btn" onclick="generateCertificate()">Download Certificate</button>`;
}

/* ========== CERTIFICATE ========== */
function generateCertificate(){
let canvas=document.getElementById("certCanvas");
let ctx=canvas.getContext("2d");

canvas.width=800;
canvas.height=500;

ctx.fillStyle="white";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="black";
ctx.font="20px Arial";

ctx.fillText("CERTIFICATE OF COMPLETION",200,80);
ctx.fillText("Name: "+selectedStudent.name,100,150);
ctx.fillText("Reg: "+selectedStudent.reg,100,190);
ctx.fillText("Subject: "+selectedSubject,100,230);
ctx.fillText("Score: "+score+"/"+quiz.length,100,270);
ctx.fillText("Certified by Call 🤙 Amos",100,330);

let link=document.createElement("a");
link.download="certificate.png";
link.href=canvas.toDataURL();
link.click();
}

let quiz=[],i=0,score=0,time=15,timer;
let currentStudent={}, currentSubject="";

/* START */
function startQuiz(){
let reg=select.value;
let combo=validateCombo();
let subject=document.getElementById("subject").value;

if(!reg||!subject){
alert("Select student and subject");
return;
}

quiz=data[subject];

currentStudent=students.find(x=>x.reg==reg);
currentSubject=subject;

document.getElementById("register").style.display="none";
document.getElementById("quizBox").style.display="block";

document.getElementById("studentInfo").innerHTML=
`Name: ${currentStudent.name}<br>Reg: ${currentStudent.reg}<br>Subject: ${subject}`;

load();
}

/* TIMER */
function startTimer(){
time=15;
document.getElementById("timer").innerText="Time: "+time;
timer=setInterval(()=>{
time--;
document.getElementById("timer").innerText="Time: "+time;
if(time==0){clearInterval(timer);i++;next();}
},1000);
}

/* LOAD */
function load(){
clearInterval(timer);
let q=quiz[i];
document.getElementById("question").innerText=q.q;

for(let j=0;j<4;j++){
document.getElementById("o"+j).innerText=q.o[j];
}

startTimer();
}

/* CHECK */
function check(ans){
clearInterval(timer);
if(ans===quiz[i].a)score++;
i++;
next();
}

/* FINAL RESULT */
function next(){
if(i<quiz.length){
load();
}else{

let message="";
let color="";

if(score>=5){
message="🎉 Congratulations! You passed 🎉";
color="green";
}else{
message="❌ Fail try again ncuti yange";
color="red";
}

document.getElementById("quizBox").innerHTML=`
<div id="certificate" style="border:5px solid ${color}; padding:20px; border-radius:15px; background:white;">
<h2>🏆 CERTIFICATE 🏆</h2>
<hr>

<h3>This certifies that</h3>
<h2>${currentStudent.name}</h2>

<p><b>Reg:</b> ${currentStudent.reg}</p>
<p><b>Subject:</b> ${currentSubject}</p>
<p><b>Score:</b> ${score}/${quiz.length}</p>

<h3 style="color:${color}">${message}</h3>

<hr>
<p><b>Certified by:</b> call 🤙 Amos</p>
</div>

<button class="btn" onclick="downloadCertificate()">Download Certificate</button>
`;
}
}

/* DOWNLOAD */
function downloadCertificate(){
html2canvas(document.getElementById("certificate")).then(canvas=>{
let a=document.createElement("a");
a.download=currentStudent.name+"_certificate.png";
a.href=canvas.toDataURL("image/png");
a.click();
});
}
